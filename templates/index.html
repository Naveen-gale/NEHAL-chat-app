<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>NEHAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="app main-app">
    <div class="bg-aura"></div>

    <header class="header blur-glass">
      <div class="header-left">
        <svg class="sparkle-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        <h1>NEHAL</h1>
      </div>
      <div class="header-actions" id="headerActions">
        <span class="model" id="userBadge">Guest</span>
      </div>
    </header>

    <div class="welcome-screen" id="welcomeScreen">
      <h1 class="greeting">Hello, <span class="gradient-text" id="welcomeName">Guest</span></h1>
      <h2 class="sub-greeting">How can I help you today?</h2>
    </div>

    <div class="chat-area" id="chatArea">
      </div>

    <div class="input-area blur-glass-bottom">
      <div class="input-container-wrapper">
        <div class="input-container">
          <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off" />
          
          <a href="/live" class="live-mic-btn" title="Live Voice Chat">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
          </a>

          <button id="sendBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="send-icon">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script defer src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>

</html>
